{{define "layout"}}<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · edge-proxy</title>
  <link rel="stylesheet" href="/static/edge.css">
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js" defer></script>
</head>
<body>
  <header>
    <h1>edge-proxy</h1>
    {{if .Authenticated}}
    <nav>
      <a href="/" {{if eq .Page "domains"}}class="active"{{end}}>域名</a>
      <a href="/upstreams" {{if eq .Page "upstreams"}}class="active"{{end}}>回源</a>
      <a href="/config" {{if eq .Page "config"}}class="active"{{end}}>配置</a>
      <form method="post" action="/logout" style="display:inline">
        <button type="submit" class="link">退出</button>
      </form>
    </nav>
    {{end}}
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}

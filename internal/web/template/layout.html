{{define "layout"}}<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · edge-proxy</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
  <script src="/static/alpine.min.js" defer></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
{{if .Authenticated}}
  <div class="drawer min-h-screen lg:drawer-open" data-admin-shell="responsive">
    <input id="admin-shell-drawer" type="checkbox" class="drawer-toggle">
    <div class="drawer-content flex min-h-screen w-full min-w-0 flex-col">
      <header class="navbar min-h-12 w-full border-b border-base-300 bg-base-100 px-4 py-2 lg:px-6">
        <div class="flex flex-1 min-w-0 items-center gap-3">
          <div class="flex-none lg:hidden">
            <label for="admin-shell-drawer" class="btn btn-ghost btn-square btn-sm" aria-label="打开导航" data-mobile-nav="admin">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </label>
          </div>
          <div class="flex min-w-0 items-baseline gap-3">
            <span class="truncate text-base font-semibold">{{.Title}}</span>
            <span class="truncate text-xs text-base-content/50">节点 · {{.NodeName}}</span>
          </div>
        </div>
        <div class="flex flex-none items-center gap-3">
          <span class="hidden text-xs text-base-content/70 sm:inline">👤 {{.User}}</span>
          <form method="post" action="/logout">
            <button type="submit" class="btn btn-ghost btn-xs">退出</button>
          </form>
        </div>
      </header>
      <main class="flex-1 min-h-0 w-full min-w-0 overflow-y-auto p-4 lg:p-6">
        {{template "content" .}}
      </main>
    </div>
    <div class="drawer-side z-40">
      <label for="admin-shell-drawer" aria-label="关闭导航" class="drawer-overlay"></label>
      <aside class="flex min-h-full w-60 shrink-0 flex-col border-r border-base-300 bg-base-100">
        <div class="flex items-center gap-2 px-5 py-4 text-lg font-semibold tracking-wide">
          <span>☁</span><span>edge-proxy</span>
        </div>
        <ul class="menu menu-md gap-1 px-2">
          <li><a href="/" class="{{if eq .Page "domains"}}active font-semibold{{end}}">🌐 域名</a></li>
          <li><a href="/upstreams" class="{{if eq .Page "upstreams"}}active font-semibold{{end}}">⚙ 回源</a></li>
          <li><a href="/config" class="{{if eq .Page "config"}}active font-semibold{{end}}">🔧 配置</a></li>
        </ul>
        <div class="mt-auto px-5 py-3 text-xs text-base-content/40">v{{.Version}}</div>
      </aside>
    </div>
  </div>
  <div x-data="toastBus()" class="toast toast-top toast-end z-50">
    <template x-for="t in items" :key="t.id">
      <div :class="'alert alert-' + t.type + ' shadow-md text-sm'" x-text="t.msg"></div>
    </template>
  </div>
{{else}}
  {{template "content" .}}
{{end}}
</body>
</html>
{{end}}

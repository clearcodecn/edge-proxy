{{define "content"}}
<div class="min-h-screen flex flex-col items-center justify-center bg-base-200 px-4">
  <div class="mb-6 text-center">
    <div class="text-5xl mb-2">☁</div>
    <h1 class="text-2xl font-semibold">edge-proxy</h1>
    <p class="text-sm text-base-content/60 mt-1">管理后台</p>
  </div>
  <div class="card w-full max-w-sm bg-base-100 shadow-md">
    <form method="post" action="/login" class="card-body gap-3">
      <label class="form-control">
        <span class="label-text text-sm">用户名</span>
        <input name="username" autofocus required class="input input-bordered input-sm" />
      </label>
      <label class="form-control">
        <span class="label-text text-sm">密码</span>
        <input name="password" type="password" required class="input input-bordered input-sm" />
      </label>
      {{if .Error}}<p class="text-error text-sm">{{.Error}}</p>{{end}}
      <button type="submit" class="btn btn-primary mt-2">登 录</button>
    </form>
  </div>
  <p class="text-xs text-base-content/50 mt-6">v{{.Version}} · {{.NodeName}}</p>
</div>
{{end}}

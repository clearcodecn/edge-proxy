{{define "content"}}
<section class="card">
  <h2>新增回源</h2>
  <form hx-post="/upstreams" hx-target="#upstream-rows" hx-swap="afterbegin" hx-on::after-request="this.reset()">
    <label>地址 <input name="addr" placeholder="10.0.0.5:80" required></label>
    <label>权重 <input name="weight" type="number" value="1" min="1" max="100" style="width:60px"></label>
    <label><input name="is_backup" type="checkbox" value="1"> 备用</label>
    <label>备注 <input name="remark"></label>
    <button type="submit">添加</button>
  </form>
</section>
<section class="card">
  <h2>回源池</h2>
  <table>
    <thead>
      <tr><th>地址</th><th>权重</th><th>备用</th><th>启用</th><th>备注</th><th>操作</th></tr>
    </thead>
    <tbody id="upstream-rows">
    {{range .Upstreams}}
      {{template "upstream_row" .}}
    {{end}}
    </tbody>
  </table>
</section>
{{end}}

{{define "upstream_row"}}
<tr id="u-{{.ID}}">
  <td>{{.Addr}}</td>
  <td>{{.Weight}}</td>
  <td>{{if .IsBackup}}是{{else}}—{{end}}</td>
  <td>{{if .Enabled}}<span class="ok">启用</span>{{else}}<span class="ko">禁用</span>{{end}}</td>
  <td>{{.Remark}}</td>
  <td class="actions">
    <button hx-post="/upstreams/{{.ID}}/toggle" hx-target="#u-{{.ID}}" hx-swap="outerHTML">{{if .Enabled}}禁用{{else}}启用{{end}}</button>
    <button hx-delete="/upstreams/{{.ID}}" hx-confirm="删除回源 {{.Addr}}?" hx-target="#u-{{.ID}}" hx-swap="delete" class="danger">删除</button>
  </td>
</tr>
{{end}}
